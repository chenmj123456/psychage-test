<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>心理年龄测试 - 密码验证</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            width: 90%;
            margin: 20px;
        }
        .card {
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            padding: 40px 28px;
            text-align: center;
        }
        .logo {
            font-size: 56px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #2c3e4f;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: #7e8c9e;
            margin-bottom: 32px;
        }
        .password-input {
            width: 100%;
            max-width: 260px;
            padding: 14px 20px;
            font-size: 20px;
            font-weight: 500;
            border: 2px solid #e0e6ed;
            border-radius: 48px;
            text-align: center;
            letter-spacing: 4px;
            font-family: monospace;
            margin: 16px auto;
            display: block;
            background: #f8fafd;
        }
        .password-input:focus {
            outline: none;
            border-color: #6c8bb3;
            background: white;
        }
        .btn {
            display: inline-block;
            padding: 14px 36px;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            border: none;
            border-radius: 48px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: linear-gradient(135deg, #8b9dc3, #6c8bb3);
            color: white;
            margin-top: 8px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(108, 139, 179, 0.3);
        }
        .error-msg {
            color: #e67e22;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            background: #fff4e8;
            padding: 10px;
            border-radius: 24px;
        }
        .hint {
            font-size: 12px;
            color: #9aaebf;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #eef2f7;
        }
        .code-badge {
            background: #f0f4fa;
            border-radius: 30px;
            padding: 8px 16px;
            display: inline-block;
            font-size: 13px;
            color: #6c8bb3;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">🔐</div>
            <h1>心理年龄测试</h1>
            <p class="subtitle">你的身体在成长，但你的灵魂几岁了？</p>
            
            <div class="code-badge">✨ 付费解锁内容 ✨</div>
            
            <input type="password" id="passwordInput" class="password-input" placeholder="请输入提取码" maxlength="10" autocomplete="off">
            
            <button id="unlockBtn" class="btn">解锁测试</button>
            
            <div id="errorMsg" class="error-msg">❌ 提取码错误，请重新输入</div>
            
            <div class="hint">
                💡 购买后请联系客服获取提取码<br>
                📱 微信：<strong id="wechatDisplay">chenmj1221</strong>
            </div>
        </div>
    </div>

    <script>
        // ⭐ 统一提取码（可以随时修改）
        const UNLOCK_CODE = "6688";
        
        // 也可以设置多个备用码
        const VALID_CODES = ["6688", "8888"];
        
        // 解锁按钮
        document.getElementById('unlockBtn').onclick = function() {
            const inputCode = document.getElementById('passwordInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            
            // 验证密码
            if (VALID_CODES.includes(inputCode) || inputCode === UNLOCK_CODE) {
                // 密码正确，记录解锁状态
                localStorage.setItem('psychage_unlocked', 'true');
                // 跳转到年龄输入页
                window.location.href = 'age-input.html';
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
                // 3秒后隐藏错误提示
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
            }
        };
        
        // 回车键解锁
        document.getElementById('passwordInput').onkeypress = function(e) {
            if (e.key === 'Enter') {
                document.getElementById('unlockBtn').click();
            }
        };
        
        // 如果已经解锁过，直接跳转（不用重复输入）
        if (localStorage.getItem('psychage_unlocked') === 'true') {
            window.location.href = 'age-input.html';
        }
        
        // 显示微信号（可以在这里修改）
        document.getElementById('wechatDisplay').innerText = 'psyche_helper';
    </script>
</body>
</html>
