<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>心理年龄测试 - 深度成长报告</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 新增样式 */
        .dimension-deep {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin: 16px 0;
            box-shadow: 0 2px 12px rgba(0,0,0,0.03);
            border: 1px solid #eef2f7;
        }
        .dimension-deep.highlight {
            border-left: 4px solid #6c8bb3;
            background: linear-gradient(135deg, #fff 0%, #fafcff 100%);
        }
        .dimension-deep.lowlight {
            border-left: 4px solid #ffb347;
            background: linear-gradient(135deg, #fff 0%, #fffaf5 100%);
        }
        .dimension-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .dimension-score {
            font-size: 14px;
            background: #f0f4fa;
            padding: 4px 12px;
            border-radius: 30px;
            color: #6c8bb3;
        }
        .psycho-tip {
            background: #f8fafd;
            padding: 12px 16px;
            border-radius: 16px;
            margin: 12px 0;
            font-size: 13px;
            color: #5a6f86;
            border-left: 3px solid #8b9dc3;
        }
        .action-list {
            margin: 12px 0 0 20px;
        }
        .action-list li {
            margin: 8px 0;
            line-height: 1.5;
        }
        .resource-box {
            background: #f8fafd;
            border-radius: 16px;
            padding: 12px 16px;
            margin-top: 12px;
            font-size: 13px;
        }
        .resource-box a {
            color: #6c8bb3;
            text-decoration: none;
        }
        .weekly-challenge {
            background: linear-gradient(135deg, #f0f4fa 0%, #e8eff7 100%);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        .weekly-challenge h4 {
            margin-bottom: 12px;
        }
        .checklist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 10px 0;
            font-size: 14px;
        }
        .checklist-item input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .growth-plan-btn {
            background: #6c8bb3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            margin-top: 12px;
            cursor: pointer;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="result-header">
                <div class="psycho-age">
                    <span id="psychoAge">—</span><small>岁</small>
                </div>
                <div class="deviation" id="deviationText"></div>
                <div class="type-name" id="typeName"></div>
                <p id="typeDesc" style="margin-top: 12px; color: #5a6f86;"></p>
            </div>
            
            <div class="tags" id="tags"></div>
            
            <div class="radar-container">
                <canvas id="radarChart" width="500" height="300" style="width: 100%; height: auto;"></canvas>
            </div>
            
            <!-- 深度维度分析 + 成长方案 -->
            <div id="deepAnalysis"></div>
            
            <!-- 每周成长挑战 -->
            <div class="weekly-challenge" id="weeklyChallenge">
                <h4>🌱 本周成长挑战</h4>
                <div id="challengeContent"></div>
            </div>
            
            <!-- 微信群引流模块 -->
            <div class="wechat-simple">
                <div style="font-size: 32px;">💬</div>
                <h3 style="margin: 8px 0;">加入「心理成长交流群」</h3>
                <p style="font-size: 14px; color: #7e8c9e; margin-bottom: 16px;">
                    与同频伙伴一起践行成长计划，每周分享进步
                </p>
                <div class="wechat-id-box">
                    <span>📱 微信号：</span>
                    <strong id="wechatId" style="color: #6c8bb3; font-size: 18px;">chenmj1221</strong>
                    <button id="copyBtn" class="copy-btn-sm">复制</button>
                </div>
                <p style="font-size: 12px; color: #9aaebf;">
                    添加时备注"成长计划"，拉你入群
                </p>
            </div>
            
            <div class="action-buttons">
                <button id="shareBtn" class="btn btn-outline">📤 分享结果</button>
                <a href="index.html" class="btn btn-outline">🔄 重新测试</a>
            </div>
        </div>
    </div>

    <script>
        // 题库数据（用于计算）
        const questionsData = [
            { dimension: "cognitive", reverse: false }, { dimension: "cognitive", reverse: false },
            { dimension: "cognitive", reverse: true }, { dimension: "cognitive", reverse: false },
            { dimension: "emotion", reverse: false }, { dimension: "emotion", reverse: false },
            { dimension: "emotion", reverse: true }, { dimension: "emotion", reverse: false },
            { dimension: "responsibility", reverse: false }, { dimension: "responsibility", reverse: false },
            { dimension: "responsibility", reverse: true }, { dimension: "responsibility", reverse: false },
            { dimension: "social", reverse: false }, { dimension: "social", reverse: false },
            { dimension: "social", reverse: true }, { dimension: "social", reverse: false },
            { dimension: "meaning", reverse: false }, { dimension: "meaning", reverse: false },
            { dimension: "meaning", reverse: true }, { dimension: "meaning", reverse: false },
            { dimension: "reality", reverse: false }, { dimension: "reality", reverse: false },
            { dimension: "reality", reverse: true }, { dimension: "reality", reverse: false }
        ];
        
        const dimNames = {
            cognitive: "认知弹性", emotion: "情绪调节", responsibility: "责任整合",
            social: "社交自主", meaning: "意义感", reality: "现实接纳"
        };
        
        // 深度维度数据：心理学解读 + 成长方案
        const dimensionDeepData = {
            cognitive: {
                name: "认知弹性",
                psychology: "认知弹性是大脑灵活切换思维模式的能力。研究表明，认知弹性高的人更少陷入思维固化，在面对变化时适应能力更强，且老年时认知衰退速度更慢。",
                lowDesc: "你倾向于用熟悉的方式思考，对新观点有些抗拒。这并不代表你固执，而是大脑的节能机制在起作用——改变需要额外的能量。",
                highDesc: "你的思维非常开放，能够灵活切换视角。这是保持心理年轻的重要特质，也是创造力和解决问题的核心能力。",
                actions: [
                    "每天接触一个你不同意的观点，先找出它的3个合理之处",
                    "每周学一个完全陌生的概念（如区块链/冥想/极简主义）",
                    "尝试用非惯用手刷牙/写字，激活大脑新回路",
                    "和一个与你观点不同的人深度聊一次，只听不辩"
                ],
                resources: ["《思考，快与慢》", "播客：Steve说", "工具：观点日记APP"]
            },
            emotion: {
                name: "情绪调节",
                psychology: "情绪调节不是压抑情绪，而是识别、接纳并恰当表达情绪的能力。高情绪智力的人能更快从负面情绪中恢复，人际关系也更稳定。",
                lowDesc: "你有时会被情绪淹没，或习惯性地压抑情绪。这可能导致内耗或突然的情绪爆发。",
                highDesc: "你能很好地识别和管理自己的情绪，这是心理成熟的重要标志。你懂得情绪是信号，而不是敌人。",
                actions: [
                    "每天花2分钟记录：'我现在感受到什么情绪？' 精确命名它",
                    "情绪激动时，先深呼吸10次再回应",
                    "尝试正念冥想，观察情绪像云一样飘过",
                    "建立情绪安全网：列出3个可以倾诉的人"
                ],
                resources: ["《情绪急救》", "潮汐APP（冥想）", "TED：情绪的力量"]
            },
            responsibility: {
                name: "责任整合",
                psychology: "责任整合是将承诺内化为自我认同的能力。成熟的人不需要外部监督就能坚持长期目标，因为他们把责任看作自我实现的一部分。",
                lowDesc: "你可能在承诺和行动之间有落差，容易被新鲜事物吸引而放弃已有计划。",
                highDesc: "你是一个可靠的人，你的承诺就是你的名片。这种特质让你在关系和工作中都备受信任。",
                actions: [
                    "从小承诺开始：每天完成一件承诺的小事并打勾",
                    "制定一个90天目标，每周回顾进度",
                    "主动承担一次团队中的责任角色",
                    "用'如果...就...'计划：'如果到晚上8点，我就完成今日任务'"
                ],
                resources: ["《原子习惯》", "Notion目标管理模板", "番茄工作法"]
            },
            social: {
                name: "社交自主",
                psychology: "社交自主是既能享受亲密关系，又能保持独立边界的能力。高社交自主的人不依赖他人认可，能健康地独处，也能深度连接。",
                lowDesc: "你可能比较在意他人看法，或者在关系中容易失去自我边界。",
                highDesc: "你拥有健康的社交边界和独处能力，这是心理成熟的重要标志。你能在关系中保持自我。",
                actions: [
                    "练习说'不'：从小事开始拒绝，观察对方的反应",
                    "每周安排2小时完全独处，做自己喜欢的事",
                    "写下'我的边界是什么'，并温和地维护它",
                    "观察一次：当你拒绝别人后，关系是否真的变差？"
                ],
                resources: ["《被讨厌的勇气》", "《界限》", "练习：非暴力沟通"]
            },
            meaning: {
                name: "意义感",
                psychology: "意义感不是找到的，而是构建的。心理学家弗兰克尔认为，即使在苦难中，人也能通过态度、创造和爱来赋予生活意义。",
                lowDesc: "你可能偶尔感到迷茫，觉得生活缺少方向。这很正常，意义感需要持续构建。",
                highDesc: "你拥有清晰的价值感和人生方向，这是内心稳定的基石。你知道什么对自己真正重要。",
                actions: [
                    "写下'对我最重要的三件事'，检查日常行为是否一致",
                    "尝试帮助一个陌生人，体验利他的意义",
                    "回顾过去一年，写下3件让你感到自豪的事",
                    "每天问自己：'今天做的事，让我离想成为的人更近了吗？'"
                ],
                resources: ["《活出生命的意义》", "意义疗法工作簿", "播客：得意忘形"]
            },
            reality: {
                name: "现实接纳",
                psychology: "现实接纳是区分'可控'与'不可控'的能力。斯多葛哲学认为，真正的自由来自于接受无法改变的事，专注改变能改变的事。",
                lowDesc: "你可能对现实有较高的期待，当现实不如预期时容易产生挫败感。",
                highDesc: "你能与不完美和平共处，这种接纳力让你更加从容。你知道改变从接纳开始。",
                actions: [
                    "练习区分：'这件事我能改变吗？' 接受不能改变的",
                    "每天写下一件'今天的不完美'，并接纳它",
                    "对自己说：'我允许自己不够完美'",
                    "列出3个你正在抗拒的现实，尝试换个角度看待"
                ],
                resources: ["《被讨厌的勇气》", "斯多葛日记", "正念练习"]
            }
        };
        
        function calculateScores(answers) {
            const scores = { cognitive: 0, emotion: 0, responsibility: 0, social: 0, meaning: 0, reality: 0 };
            const counts = { cognitive: 0, emotion: 0, responsibility: 0, social: 0, meaning: 0, reality: 0 };
            
            answers.forEach((answer, idx) => {
                if (answer === null) return;
                const q = questionsData[idx];
                let score = answer;
                if (q.reverse) score = 6 - answer;
                scores[q.dimension] += score;
                counts[q.dimension]++;
            });
            
            const result = {};
            for (let dim of Object.keys(scores)) {
                if (counts[dim] > 0) {
                    const maxPossible = counts[dim] * 5;
                    result[dim] = Math.round((scores[dim] / maxPossible) * 30);
                } else {
                    result[dim] = 15;
                }
            }
            return result;
        }
        
        function getAgeMapping(totalScore) {
            if (totalScore <= 70) return { age: 19, type: "探索型心灵", desc: "你的内心住着一个永远好奇的少年，对世界充满新鲜感。" };
            if (totalScore <= 90) return { age: 26, type: "成长型心灵", desc: "你在探索与责任之间寻找平衡，正处于快速成长期。" };
            if (totalScore <= 110) return { age: 35, type: "整合型心灵", desc: "你开始将经验内化为智慧，内心趋于稳定和自洽。" };
            if (totalScore <= 125) return { age: 45, type: "通透型心灵", desc: "你看待问题更加全面，能接纳复杂性和矛盾。" };
            return { age: 58, type: "智慧型心灵", desc: "你的内心如智者般通透，拥有超越年龄的洞察力。" };
        }
        
        function renderDeepAnalysis(dimScores) {
            const container = document.getElementById('deepAnalysis');
            const dimOrder = ['cognitive', 'emotion', 'responsibility', 'social', 'meaning', 'reality'];
            
            let html = '<h3 style="margin: 20px 0 12px;">📖 深度成长分析</h3>';
            
            for (let dim of dimOrder) {
                const score = dimScores[dim];
                const data = dimensionDeepData[dim];
                const isLow = score < 20;
                const statusClass = isLow ? 'lowlight' : 'highlight';
                const statusText = isLow ? '🔍 成长空间' : '✨ 你的优势';
                const desc = isLow ? data.lowDesc : data.highDesc;
                
                html += `
                    <div class="dimension-deep ${statusClass}">
                        <div class="dimension-title">
                            <span>${data.name}</span>
                            <span class="dimension-score">${score}/30 ${statusText}</span>
                        </div>
                        <div class="psycho-tip">
                            💡 <strong>心理学小知识</strong><br>
                            ${data.psychology}
                        </div>
                        <p style="margin: 12px 0; font-size: 14px; color: #5a6f86;">${desc}</p>
                        <div>
                            <strong>🎯 可执行的成长行动</strong>
                            <ul class="action-list">
                                ${data.actions.map(action => `<li>□ ${action}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="resource-box">
                            📚 <strong>推荐资源</strong><br>
                            ${data.resources.join(' · ')}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        function renderWeeklyChallenge(dimScores) {
            // 找出最低分维度
            let minDim = null;
            let minScore = 100;
            for (let [dim, score] of Object.entries(dimScores)) {
                if (score < minScore) {
                    minScore = score;
                    minDim = dim;
                }
            }
            
            const data = dimensionDeepData[minDim];
            if (data && minScore < 22) {
                const challengeActions = data.actions.slice(0, 3);
                document.getElementById('challengeContent').innerHTML = `
                    <p>本周重点提升：<strong>${data.name}</strong> (当前${minScore}/30)</p>
                    <div class="checklist-item"><input type="checkbox" id="chk1"> ${challengeActions[0]}</div>
                    <div class="checklist-item"><input type="checkbox" id="chk2"> ${challengeActions[1]}</div>
                    <div class="checklist-item"><input type="checkbox" id="chk3"> ${challengeActions[2]}</div>
                    <button class="growth-plan-btn" onclick="alert('截图保存你的计划，加入微信群一起打卡吧！')">📸 保存计划</button>
                `;
            } else {
                document.getElementById('challengeContent').innerHTML = `
                    <p>🎉 你的各项能力都很出色！</p>
                    <p>试试挑战提升「${dimNames[Object.keys(dimScores)[0]]}」，让优势更突出</p>
                    <button class="growth-plan-btn" onclick="alert('选择一个维度，开启你的成长之旅')">🚀 开启挑战</button>
                `;
            }
        }
        
        function renderResult() {
            const answers = JSON.parse(localStorage.getItem('psychage_answers'));
            const actualAge = JSON.parse(localStorage.getItem('psychage_age'));
            
            if (!answers || !actualAge) {
                window.location.href = 'index.html';
                return;
            }
            
            const dimScores = calculateScores(answers);
            const totalRaw = answers.reduce((s, a) => s + (a || 0), 0);
            const totalScore = Math.round((totalRaw / 120) * 140);
            const ageInfo = getAgeMapping(totalScore);
            
            const psychoAge = ageInfo.age;
            const deviation = psychoAge - actualAge;
            const deviationText = deviation >= 0 ? `成熟${deviation}岁` : `年轻${-deviation}岁`;
            
            document.getElementById('psychoAge').textContent = psychoAge;
            document.getElementById('deviationText').textContent = `你的内心比实际年龄${deviationText}`;
            document.getElementById('typeName').textContent = ageInfo.type;
            document.getElementById('typeDesc').textContent = ageInfo.desc;
            
            // 标签
            const tags = ['#心理成长', '#自我觉察', '#内在探索', '#成长计划'];
            document.getElementById('tags').innerHTML = tags.map(t => `<span class="tag">${t}</span>`).join('');
            
            // 深度分析
            renderDeepAnalysis(dimScores);
            
            // 每周挑战
            renderWeeklyChallenge(dimScores);
            
            // 雷达图
            renderRadarChart(dimScores);
            
            // 分享功能
            document.getElementById('shareBtn').onclick = () => {
                const shareText = `我的心理年龄${psychoAge}岁，${deviationText}！已获得专属成长计划，快来测测你的心理年龄 →`;
                if (navigator.share) {
                    navigator.share({ title: '心理年龄测试', text: shareText, url: window.location.href });
                } else {
                    prompt('分享链接', window.location.href);
                }
            };
            
            // 复制微信号
            document.getElementById('copyBtn').onclick = () => {
                const wechatId = document.getElementById('wechatId').innerText;
                navigator.clipboard.writeText(wechatId).then(() => {
                    alert('微信号已复制，请打开微信添加好友，备注"成长计划"');
                });
            };
        }
        
        function renderRadarChart(scores) {
            const canvas = document.getElementById('radarChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const values = [scores.cognitive, scores.emotion, scores.responsibility, scores.social, scores.meaning, scores.reality];
            const labels = ['认知弹性', '情绪调节', '责任整合', '社交自主', '意义感', '现实接纳'];
            
            const width = canvas.width = canvas.offsetWidth || 500;
            const height = canvas.height = 300;
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) * 0.35;
            const angles = labels.map((_, i) => (i * 2 * Math.PI / labels.length) - Math.PI / 2);
            
            ctx.clearRect(0, 0, width, height);
            
            for (let level = 1; level <= 5; level++) {
                ctx.beginPath();
                const r = radius * (level / 5);
                angles.forEach((angle, i) => {
                    const x = centerX + r * Math.cos(angle);
                    const y = centerY + r * Math.sin(angle);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.closePath();
                ctx.strokeStyle = '#e0e6ed';
                ctx.stroke();
            }
            
            angles.forEach(angle => {
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = '#e0e6ed';
                ctx.stroke();
            });
            
            ctx.beginPath();
            values.forEach((value, i) => {
                const r = radius * (value / 30);
                const x = centerX + r * Math.cos(angles[i]);
                const y = centerY + r * Math.sin(angles[i]);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.closePath();
            ctx.fillStyle = 'rgba(108, 139, 179, 0.3)';
            ctx.fill();
            ctx.strokeStyle = '#6c8bb3';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.fillStyle = '#4a627a';
            ctx.font = '12px sans-serif';
            angles.forEach((angle, i) => {
                const x = centerX + (radius + 20) * Math.cos(angle);
                const y = centerY + (radius + 20) * Math.sin(angle);
                ctx.fillText(labels[i], x - 20, y);
            });
        }
        
        renderResult();
    </script>
</body>
</html>
