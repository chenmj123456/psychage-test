<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>心理年龄测试 - 你的结果</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .improvement-tips {
            background: linear-gradient(135deg, #fff9e8 0%, #fff4e0 100%);
            border-left: 4px solid #ffb347;
            padding: 16px 20px;
            margin: 16px 0;
            border-radius: 16px;
        }
        .improvement-tips h4 {
            color: #e67e22;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .improvement-tips ul {
            margin-left: 20px;
            color: #5a6f86;
        }
        .improvement-tips li {
            margin: 8px 0;
            line-height: 1.5;
        }
        .dimension-card {
            background: white;
            border-radius: 16px;
            padding: 12px 16px;
            margin: 8px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #eef2f7;
        }
        .dimension-high {
            border-left: 4px solid #6c8bb3;
        }
        .dimension-low {
            border-left: 4px solid #ffb347;
        }
        .wechat-simple {
            text-align: center;
            padding: 20px;
            background: #f8fafd;
            border-radius: 24px;
            margin: 20px 0;
        }
        .wechat-id-box {
            background: white;
            border-radius: 48px;
            padding: 12px 20px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0;
            border: 1px solid #e0e6ed;
        }
        .copy-btn-sm {
            background: #6c8bb3;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="result-header">
                <div class="psycho-age">
                    <span id="psychoAge">—</span><small>岁</small>
                </div>
                <div class="deviation" id="deviationText"></div>
                <div class="type-name" id="typeName"></div>
                <p id="typeDesc" style="margin-top: 12px; color: #5a6f86;"></p>
            </div>
            
            <div class="tags" id="tags"></div>
            
            <div class="radar-container">
                <canvas id="radarChart" width="500" height="300" style="width: 100%; height: auto;"></canvas>
            </div>
            
            <div class="analysis-block">
                <h4>📊 维度分析</h4>
                <div id="dimensionAnalysis"></div>
            </div>
            
            <!-- 针对性提升建议模块 -->
            <div class="improvement-tips" id="improvementTips">
                <h4>🌱 专属成长建议</h4>
                <div id="tipsContent"></div>
            </div>
            
            <div class="analysis-block">
                <h4>✨ 核心优势</h4>
                <ul id="strengths" style="margin-left: 20px; color: #5a6f86;"></ul>
            </div>
            
            <!-- 微信群引流模块（简化版，方便修改微信号）-->
            <div class="wechat-simple">
                <div style="font-size: 32px;">💬</div>
                <h3 style="margin: 8px 0;">加入「心理成长交流群」</h3>
                <p style="font-size: 14px; color: #7e8c9e; margin-bottom: 16px;">
                    与同频伙伴探讨心理成长，获取更多深度内容
                </p>
                
                <!-- 方式一：微信群二维码（可选）-->
                <div id="qrcodeArea" style="display: none;">
                    <img id="groupQrcode" src="assets/wechat-group-qrcode.jpg" alt="群二维码" 
                         style="width: 160px; border-radius: 16px; margin: 10px 0;">
                </div>
                
                <!-- 方式二：微信号（推荐，简单直接）-->
                <div class="wechat-id-box">
                    <span>📱 微信号：</span>
                    <strong id="wechatId" style="color: #6c8bb3; font-size: 18px;">chenmj1221</strong>
                    <button id="copyBtn" class="copy-btn-sm">复制</button>
                </div>
                <p style="font-size: 12px; color: #9aaebf;">
                    添加时备注"心理年龄"，拉你入群
                </p>
            </div>
            
            <div class="action-buttons">
                <button id="shareBtn" class="btn btn-outline">📤 分享结果</button>
                <a href="index.html" class="btn btn-outline">🔄 重新测试</a>
            </div>
        </div>
    </div>
    
    <script>
        // 题库数据（用于计算）
        const questionsData = [
            { dimension: "cognitive", reverse: false }, { dimension: "cognitive", reverse: false },
            { dimension: "cognitive", reverse: true }, { dimension: "cognitive", reverse: false },
            { dimension: "emotion", reverse: false }, { dimension: "emotion", reverse: false },
            { dimension: "emotion", reverse: true }, { dimension: "emotion", reverse: false },
            { dimension: "responsibility", reverse: false }, { dimension: "responsibility", reverse: false },
            { dimension: "responsibility", reverse: true }, { dimension: "responsibility", reverse: false },
            { dimension: "social", reverse: false }, { dimension: "social", reverse: false },
            { dimension: "social", reverse: true }, { dimension: "social", reverse: false },
            { dimension: "meaning", reverse: false }, { dimension: "meaning", reverse: false },
            { dimension: "meaning", reverse: true }, { dimension: "meaning", reverse: false },
            { dimension: "reality", reverse: false }, { dimension: "reality", reverse: false },
            { dimension: "reality", reverse: true }, { dimension: "reality", reverse: false }
        ];
        
        const dimNames = {
            cognitive: "认知弹性", emotion: "情绪调节", responsibility: "责任整合",
            social: "社交自主", meaning: "意义感", reality: "现实接纳"
        };
        
        // 针对每个维度的具体提升建议
        const improvementAdvice = {
            cognitive: {
                title: "🧠 提升认知弹性",
                tips: [
                    "每周接触一个你不同意的观点，尝试理解对方的3个合理之处",
                    "学习一个完全陌生的领域知识（如编程、哲学、艺术）",
                    "主动与观点不同的人交流，练习说'你的角度很有意思'"
                ]
            },
            emotion: {
                title: "💖 提升情绪调节",
                tips: [
                    "每天花2分钟记录：'我现在感受到什么情绪？' 精确命名它",
                    "情绪激动时，先深呼吸10次再回应",
                    "尝试正念冥想，观察情绪像云一样飘过"
                ]
            },
            responsibility: {
                title: "🎯 提升责任整合",
                tips: [
                    "从小承诺开始：每天完成一件承诺的小事并打勾",
                    "制定一个90天目标，每周回顾进度",
                    "主动承担一次团队中的责任角色"
                ]
            },
            social: {
                title: "🤝 提升社交自主",
                tips: [
                    "练习说'不'：从小事开始拒绝，观察对方的反应",
                    "每周安排2小时完全独处，做自己喜欢的事",
                    "写下'我的边界是什么'，并温和地维护它"
                ]
            },
            meaning: {
                title: "🌟 提升意义感",
                tips: [
                    "写下'对我最重要的三件事'，检查日常行为是否一致",
                    "尝试帮助一个陌生人，体验利他的意义",
                    "回顾过去一年，写下3件让你感到自豪的事"
                ]
            },
            reality: {
                title: "🌿 提升现实接纳",
                tips: [
                    "练习区分：'这件事我能改变吗？' 接受不能改变的",
                    "每天写下一件'今天的不完美'，并接纳它",
                    "对自己说：'我允许自己不够完美'"
                ]
            }
        };
        
        function calculateScores(answers) {
            const scores = { cognitive: 0, emotion: 0, responsibility: 0, social: 0, meaning: 0, reality: 0 };
            const counts = { cognitive: 0, emotion: 0, responsibility: 0, social: 0, meaning: 0, reality: 0 };
            
            answers.forEach((answer, idx) => {
                if (answer === null) return;
                const q = questionsData[idx];
                let score = answer;
                if (q.reverse) score = 6 - answer;
                scores[q.dimension] += score;
                counts[q.dimension]++;
            });
            
            const result = {};
            for (let dim of Object.keys(scores)) {
                if (counts[dim] > 0) {
                    const maxPossible = counts[dim] * 5;
                    result[dim] = Math.round((scores[dim] / maxPossible) * 30);
                } else {
                    result[dim] = 15;
                }
            }
            return result;
        }
        
        function getAgeMapping(totalScore) {
            if (totalScore <= 70) return { age: 19, type: "探索型心灵", desc: "你的内心住着一个永远好奇的少年，对世界充满新鲜感。" };
            if (totalScore <= 90) return { age: 26, type: "成长型心灵", desc: "你在探索与责任之间寻找平衡，正处于快速成长期。" };
            if (totalScore <= 110) return { age: 35, type: "整合型心灵", desc: "你开始将经验内化为智慧，内心趋于稳定和自洽。" };
            if (totalScore <= 125) return { age: 45, type: "通透型心灵", desc: "你看待问题更加全面，能接纳复杂性和矛盾。" };
            return { age: 58, type: "智慧型心灵", desc: "你的内心如智者般通透，拥有超越年龄的洞察力。" };
        }
        
        function renderResult() {
            const answers = JSON.parse(localStorage.getItem('psychage_answers'));
            const actualAge = JSON.parse(localStorage.getItem('psychage_age'));
            
            if (!answers || !actualAge) {
                window.location.href = 'index.html';
                return;
            }
            
            const dimScores = calculateScores(answers);
            const totalRaw = answers.reduce((s, a) => s + (a || 0), 0);
            const totalScore = Math.round((totalRaw / 120) * 140);
            const ageInfo = getAgeMapping(totalScore);
            
            const psychoAge = ageInfo.age;
            const deviation = psychoAge - actualAge;
            const deviationText = deviation >= 0 ? `成熟${deviation}岁` : `年轻${-deviation}岁`;
            
            document.getElementById('psychoAge').textContent = psychoAge;
            document.getElementById('deviationText').textContent = `你的内心比实际年龄${deviationText}`;
            document.getElementById('typeName').textContent = ageInfo.type;
            document.getElementById('typeDesc').textContent = ageInfo.desc;
            
            // 找出最低分维度（需要提升的）
            let minDim = null;
            let minScore = 100;
            for (let [dim, score] of Object.entries(dimScores)) {
                if (score < minScore) {
                    minScore = score;
                    minDim = dim;
                }
            }
            
            // 显示针对性建议
            const tipsDiv = document.getElementById('tipsContent');
            if (minDim && minScore < 22) {
                const advice = improvementAdvice[minDim];
                if (advice) {
                    tipsDiv.innerHTML = `
                        <p style="margin-bottom: 12px; font-weight: 500;">📌 你的「${dimNames[minDim]}」得分较低（${minScore}/30），以下是专属提升方案：</p>
                        <ul>
                            ${advice.tips.map(t => `<li>${t}</li>`).join('')}
                        </ul>
                        <p style="margin-top: 12px; font-size: 13px; color: #e67e22;">✨ 坚持2-4周，你会看到明显变化</p>
                    `;
                } else {
                    tipsDiv.innerHTML = `<p>你的各项能力均衡发展，继续保持！</p>`;
                }
            } else {
                tipsDiv.innerHTML = `<p>🎉 你的各项能力都很出色！继续保持，也可以看看其他维度的建议作为参考。</p>`;
            }
            
            // 显示维度分析
            const dimOrder = ['cognitive', 'emotion', 'responsibility', 'social', 'meaning', 'reality'];
            const analysisHtml = dimOrder.map(dim => {
                const score = dimScores[dim];
                const percent = (score / 30) * 100;
                const isLow = score < 20;
                return `
                    <div class="dimension-card ${isLow ? 'dimension-low' : 'dimension-high'}">
                        <div style="display: flex; justify-content: space-between;">
                            <strong>${dimNames[dim]}</strong>
                            <span>${score}/30</span>
                        </div>
                        <div class="dimension-bar" style="margin-top: 8px;">
                            <div class="dimension-fill" style="width: ${percent}%; height: 6px;"></div>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('dimensionAnalysis').innerHTML = analysisHtml;
            
            // 显示优势（得分最高的2-3个维度）
            const sortedDims = Object.entries(dimScores).sort((a,b) => b[1] - a[1]);
            const strengths = sortedDims.slice(0, 3).map(([dim, score]) => dimNames[dim]);
            document.getElementById('strengths').innerHTML = strengths.map(s => `<li>${s}</li>`).join('');
            
            // 标签
            const tags = ['#心理成长', '#自我觉察', '#内在探索', '#成熟心智'];
            document.getElementById('tags').innerHTML = tags.map(t => `<span class="tag">${t}</span>`).join('');
            
            // 雷达图
            renderRadarChart(dimScores);
            
            // 分享功能
            document.getElementById('shareBtn').onclick = () => {
                const shareText = `我的心理年龄${psychoAge}岁，${deviationText}！快来测测你的心理年龄 →`;
                if (navigator.share) {
                    navigator.share({ title: '心理年龄测试', text: shareText, url: window.location.href });
                } else {
                    prompt('分享链接', window.location.href);
                }
            };
            
            // 复制微信号
            document.getElementById('copyBtn').onclick = () => {
                const wechatId = document.getElementById('wechatId').innerText;
                navigator.clipboard.writeText(wechatId).then(() => {
                    alert('微信号已复制，请打开微信添加好友，备注"心理年龄"');
                });
            };
        }
        
        function renderRadarChart(scores) {
            const canvas = document.getElementById('radarChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const values = [scores.cognitive, scores.emotion, scores.responsibility, scores.social, scores.meaning, scores.reality];
            const labels = ['认知弹性', '情绪调节', '责任整合', '社交自主', '意义感', '现实接纳'];
            
            const width = canvas.width = canvas.offsetWidth || 500;
            const height = canvas.height = 300;
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) * 0.35;
            const angles = labels.map((_, i) => (i * 2 * Math.PI / labels.length) - Math.PI / 2);
            
            ctx.clearRect(0, 0, width, height);
            
            for (let level = 1; level <= 5; level++) {
                ctx.beginPath();
                const r = radius * (level / 5);
                angles.forEach((angle, i) => {
                    const x = centerX + r * Math.cos(angle);
                    const y = centerY + r * Math.sin(angle);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.closePath();
                ctx.strokeStyle = '#e0e6ed';
                ctx.stroke();
            }
            
            angles.forEach(angle => {
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = '#e0e6ed';
                ctx.stroke();
            });
            
            ctx.beginPath();
            values.forEach((value, i) => {
                const r = radius * (value / 30);
                const x = centerX + r * Math.cos(angles[i]);
                const y = centerY + r * Math.sin(angles[i]);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.closePath();
            ctx.fillStyle = 'rgba(108, 139, 179, 0.3)';
            ctx.fill();
            ctx.strokeStyle = '#6c8bb3';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.fillStyle = '#4a627a';
            ctx.font = '12px sans-serif';
            angles.forEach((angle, i) => {
                const x = centerX + (radius + 20) * Math.cos(angle);
                const y = centerY + (radius + 20) * Math.sin(angle);
                ctx.fillText(labels[i], x - 20, y);
            });
        }
        
        renderResult();
    </script>
</body>
</html>
