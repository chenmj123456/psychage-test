<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>恋爱认知模式评估 LCIA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #fdf4f0 0%, #fde8e8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            width: 90%;
            margin: 20px;
        }
        .card {
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            padding: 40px 28px;
            text-align: center;
        }
        .logo {
            font-size: 56px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 26px;
            font-weight: 600;
            color: #c94f4f;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: #7e8c9e;
            margin-bottom: 32px;
        }
        .theory-badge {
            background: #fdf0f0;
            padding: 12px;
            border-radius: 16px;
            margin: 16px 0;
            font-size: 12px;
            color: #c94f4f;
            text-align: left;
        }
        .password-input {
            width: 100%;
            max-width: 260px;
            padding: 14px 20px;
            font-size: 20px;
            font-weight: 500;
            border: 2px solid #f0d4d4;
            border-radius: 48px;
            text-align: center;
            letter-spacing: 4px;
            font-family: monospace;
            margin: 16px auto;
            display: block;
            background: #fef8f8;
        }
        .password-input:focus {
            outline: none;
            border-color: #c94f4f;
            background: white;
        }
        .btn {
            display: inline-block;
            padding: 14px 36px;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            border: none;
            border-radius: 48px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: linear-gradient(135deg, #c94f4f, #b33a3a);
            color: white;
            margin-top: 8px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(201, 79, 79, 0.3);
        }
        .error-msg {
            color: #e67e22;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            background: #fff4e8;
            padding: 10px;
            border-radius: 24px;
        }
        .hint {
            font-size: 12px;
            color: #9aaebf;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #f0d4d4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">💔🔬</div>
            <h1>恋爱认知模式评估</h1>
            <p class="subtitle">LCIA · 基于心理学理论编制</p>
            
            <div class="theory-badge">
                📖 本评估基于：依恋理论 · 自我分化理论 · 认知偏差理论 · 共依赖理论
            </div>
            
            <input type="password" id="passwordInput" class="password-input" placeholder="提取码" maxlength="10" autocomplete="off">
            
            <button id="unlockBtn" class="btn">开始评估</button>
            
            <div id="errorMsg" class="error-msg">❌ 提取码错误</div>
            
            <div class="hint">
                💡 购买后请联系客服获取提取码<br>
                📱 微信：<strong id="wechatDisplay">chenmj1221</strong>
            </div>
        </div>
    </div>

    <script>
        const UNLOCK_CODE = "6688";
        const VALID_CODES = ["6688", "8888"];
        
        document.getElementById('unlockBtn').onclick = function() {
            const inputCode = document.getElementById('passwordInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            
            if (VALID_CODES.includes(inputCode) || inputCode === UNLOCK_CODE) {
                localStorage.setItem('lovebrain_unlocked', 'true');
                window.location.href = 'age-input.html';
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('passwordInput').value = '';
                setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
            }
        };
        
        document.getElementById('passwordInput').onkeypress = function(e) {
            if (e.key === 'Enter') document.getElementById('unlockBtn').click();
        };
        
        if (localStorage.getItem('lovebrain_unlocked') === 'true') {
            window.location.href = 'age-input.html';
        }
        
        document.getElementById('wechatDisplay').innerText = 'chenmj1221';
    </script>
</body>
</html>
