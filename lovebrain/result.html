<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>恋爱认知模式评估 - 报告</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="data.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #fdf4f0 0%, #fde8e8 100%);
        }
        .dimension-deep {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin: 16px 0;
            box-shadow: 0 2px 12px rgba(0,0,0,0.03);
            border: 1px solid #f0d4d4;
        }
        .dimension-deep.highlight {
            border-left: 4px solid #6c8bb3;
            background: linear-gradient(135deg, #fff 0%, #fafcff 100%);
        }
        .dimension-deep.lowlight {
            border-left: 4px solid #c94f4f;
            background: linear-gradient(135deg, #fff 0%, #fef8f8 100%);
        }
        .dimension-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: #c94f4f;
        }
        .dimension-score {
            font-size: 14px;
            background: #fdf0f0;
            padding: 4px 12px;
            border-radius: 30px;
            color: #c94f4f;
        }
        .psycho-tip {
            background: #fef8f8;
            padding: 12px 16px;
            border-radius: 16px;
            margin: 12px 0;
            font-size: 13px;
            color: #5a6f86;
            border-left: 3px solid #c94f4f;
        }
        .action-list {
            margin: 12px 0 0 20px;
        }
        .action-list li {
            margin: 8px 0;
            line-height: 1.5;
        }
        .resource-box {
            background: #fef8f8;
            border-radius: 16px;
            padding: 12px 16px;
            margin-top: 12px;
            font-size: 13px;
        }
        .result-badge {
            background: linear-gradient(135deg, #c94f4f, #b33a3a);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            display: inline-block;
            margin: 16px 0;
            font-size: 14px;
        }
        .wechat-simple {
            text-align: center;
            padding: 20px;
            background: #fef8f8;
            border-radius: 24px;
            margin: 20px 0;
        }
        .wechat-id-box {
            background: white;
            border-radius: 48px;
            padding: 12px 20px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0;
            border: 1px solid #f0d4d4;
        }
        .copy-btn-sm {
            background: #c94f4f;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        .action-buttons .btn {
            flex: 1;
            min-width: 100px;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #c94f4f;
            color: #c94f4f;
        }
        .btn-outline:hover {
            background: #fef8f8;
        }
        @media (max-width: 480px) {
            .action-buttons {
                flex-direction: column;
            }
            .action-buttons .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="reportCard">
            <div class="result-header">
                <div class="logo" style="font-size: 48px;">💔🔬</div>
                <h1 style="color: #c94f4f;">恋爱认知模式评估</h1>
                <p class="subtitle">LCIA · 基于心理学理论编制</p>
                <div class="result-badge" id="resultBadge">—</div>
                <div class="psycho-age">
                    <span id="totalScore">—</span><small>/150</small>
                </div>
                <p id="typeDesc" style="margin-top: 12px; color: #5a6f86;"></p>
            </div>
            
            <div class="radar-container">
                <canvas id="radarChart" width="500" height="300" style="width: 100%; height: auto;"></canvas>
            </div>
            
            <div id="deepAnalysis"></div>
            
            <div class="wechat-simple">
                <div style="font-size: 32px;">💬</div>
                <h3 style="margin: 8px 0;">加入「清醒成长交流群」</h3>
                <p style="font-size: 14px; color: #7e8c9e; margin-bottom: 16px;">
                    与同频伙伴一起成长，每周分享觉察
                </p>
                <div class="wechat-id-box">
                    <span>📱 微信号：</span>
                    <strong id="wechatId" style="color: #c94f4f; font-size: 18px;">chenmj1221</strong>
                    <button id="copyBtn" class="copy-btn-sm">复制</button>
                </div>
                <p style="font-size: 12px; color: #9aaebf;">
                    添加时备注"恋爱评估"，拉你入群
                </p>
            </div>
            
            <div class="action-buttons">
                <button id="saveImgBtn" class="btn btn-outline">📸 保存报告图</button>
                <button id="shareBtn" class="btn btn-outline">📤 分享结果</button>
                <a href="index.html" class="btn btn-outline">🔄 重新评估</a>
            </div>
            
            <div class="hint" style="margin-top: 24px; font-size: 11px; color: #9aaebf; text-align: center;">
                📊 本评估基于依恋理论、自我分化理论、认知偏差理论编制，仅供自我探索参考，不作为临床诊断依据。
            </div>
        </div>
    </div>

    <script>
        function calculateScores(answers) {
            const scores = {
                idealization: 0, anxiety: 0, boundary: 0,
                overgiving: 0, separation: 0, rumination: 0
            };
            
            answers.forEach((answer, idx) => {
                if (answer === null) return;
                const q = questions[idx];
                let score = answer;
                if (q.reverse) score = 6 - answer;
                scores[q.dimension] += score;
            });
            
            return scores;
        }
        
        function renderDeepAnalysis(scores) {
            const container = document.getElementById('deepAnalysis');
            const dimOrder = ['idealization', 'anxiety', 'boundary', 'overgiving', 'separation', 'rumination'];
            const dimNamesMap = {
                idealization: '理想化倾向', anxiety: '依恋焦虑', boundary: '边界清晰度',
                overgiving: '过度付出', separation: '分离焦虑', rumination: '执念水平'
            };
            
            let html = '<h3 style="margin: 20px 0 12px;">📖 维度深度分析</h3>';
            
            for (let dim of dimOrder) {
                const score = scores[dim];
                const data = dimensions[dim];
                const isLow = score < 13;
                const statusClass = isLow ? 'highlight' : 'lowlight';
                const statusText = isLow ? '✨ 健康水平' : '⚠️ 关注区域';
                const desc = isLow ? data.lowDesc : data.highDesc;
                const advice = isLow ? data.lowAdvice : data.highAdvice;
                
                html += `
                    <div class="dimension-deep ${statusClass}">
                        <div class="dimension-title">
                            <span>${data.name}</span>
                            <span class="dimension-score">${score}/25 ${statusText}</span>
                        </div>
                        <div class="psycho-tip">
                            💡 <strong>心理学小知识</strong><br>
                            ${data.psychology}
                        </div>
                        <p style="margin: 12px 0; font-size: 14px; color: #5a6f86;">${desc}</p>
                        <div>
                            <strong>🎯 成长建议</strong>
                            <ul class="action-list">
                                <li>${advice}</li>
                            </ul>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        function renderRadarChart(scores) {
            const canvas = document.getElementById('radarChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const values = [
                scores.idealization, scores.anxiety, scores.boundary,
                scores.overgiving, scores.separation, scores.rumination
            ];
            const labels = ['理想化', '依恋焦虑', '边界感', '过度付出', '分离焦虑', '执念'];
            
            const width = canvas.width = canvas.offsetWidth || 500;
            const height = canvas.height = 300;
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) * 0.35;
            const angles = labels.map((_, i) => (i * 2 * Math.PI / labels.length) - Math.PI / 2);
            
            ctx.clearRect(0, 0, width, height);
            
            for (let level = 1; level <= 5; level++) {
                ctx.beginPath();
                const r = radius * (level / 5);
                angles.forEach((angle, i) => {
                    const x = centerX + r * Math.cos(angle);
                    const y = centerY + r * Math.sin(angle);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.closePath();
                ctx.strokeStyle = '#f0d4d4';
                ctx.stroke();
            }
            
            angles.forEach(angle => {
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = '#f0d4d4';
                ctx.stroke();
            });
            
            ctx.beginPath();
            values.forEach((value, i) => {
                const r = radius * (value / 25);
                const x = centerX + r * Math.cos(angles[i]);
                const y = centerY + r * Math.sin(angles[i]);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.closePath();
            ctx.fillStyle = 'rgba(201, 79, 79, 0.2)';
            ctx.fill();
            ctx.strokeStyle = '#c94f4f';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.fillStyle = '#c94f4f';
            ctx.font = '12px sans-serif';
            angles.forEach((angle, i) => {
                const x = centerX + (radius + 20) * Math.cos(angle);
                const y = centerY + (radius + 20) * Math.sin(angle);
                ctx.fillText(labels[i], x - 20, y);
            });
        }
        
        function renderResult() {
            const answers = JSON.parse(localStorage.getItem('lovebrain_answers'));
            const actualAge = JSON.parse(localStorage.getItem('lovebrain_age'));
            
            if (!answers || !actualAge) {
                window.location.href = 'index.html';
                return;
            }
            
            const dimScores = calculateScores(answers);
            const totalRaw = answers.reduce((s, a) => s + (a || 0), 0);
            const totalScore = totalRaw;
            const resultType = getResultType(totalScore);
            
            document.getElementById('totalScore').textContent = totalScore;
            document.getElementById('resultBadge').innerHTML = resultType.type + ' · ' + resultType.tag;
            document.getElementById('typeDesc').textContent = resultType.desc;
            
            renderDeepAnalysis(dimScores);
            renderRadarChart(dimScores);
            
            document.getElementById('shareBtn').onclick = () => {
                const shareText = `我的恋爱认知模式评估结果：${resultType.type}（${totalScore}/150），已获得专属成长方案。`;
                if (navigator.share) {
                    navigator.share({ title: '恋爱认知模式评估', text: shareText, url: window.location.href });
                } else {
                    prompt('分享链接', window.location.href);
                }
            };
            
            document.getElementById('copyBtn').onclick = () => {
                const wechatId = document.getElementById('wechatId').innerText;
                navigator.clipboard.writeText(wechatId).then(() => {
                    alert('微信号已复制，请打开微信添加好友，备注"恋爱评估"');
                });
            };
            
            const saveBtn = document.getElementById('saveImgBtn');
            if (saveBtn) {
                saveBtn.onclick = function() {
                    const element = document.getElementById('reportCard');
                    const btn = this;
                    const originalText = btn.innerText;
                    btn.innerText = '生成中...';
                    btn.disabled = true;
                    
                    const originalDisplay = saveBtn.style.display;
                    saveBtn.style.display = 'none';
                    
                    html2canvas(element, {
                        scale: 2,
                        backgroundColor: '#ffffff',
                        logging: false,
                        useCORS: true
                    }).then(canvas => {
                        saveBtn.style.display = originalDisplay;
                        const link = document.createElement('a');
                        link.download = '恋爱认知模式评估报告.png';
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                        btn.innerText = originalText;
                        btn.disabled = false;
                    }).catch(error => {
                        console.error('截图失败:', error);
                        saveBtn.style.display = originalDisplay;
                        btn.innerText = originalText;
                        btn.disabled = false;
                        alert('保存失败，请重试');
                    });
                };
            }
        }
        
        renderResult();
    </script>
</body>
</html>
