<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>精神状态评估 - 诊断报告</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="data.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #FF6B35 0%, #7B2CBF 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .report-card {
            background: #0A0A0A;
            border-radius: 48px;
            padding: 32px 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 107, 53, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .result-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo {
            font-size: 56px;
            margin-bottom: 8px;
        }
        .title {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #FF6B35, #FF2A6D);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subtitle {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }
        .personality-badge {
            margin: 20px 0 8px;
            text-align: center;
        }
        .personality-name {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, #FF6B35, #FF2A6D, #7B2CBF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
        }
        .personality-tag {
            display: inline-block;
            background: rgba(255, 107, 53, 0.2);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            color: #FF6B35;
            border: 1px solid rgba(255, 107, 53, 0.3);
            margin-top: 8px;
        }
        .slogan-box {
            background: linear-gradient(135deg, rgba(255,107,53,0.15), rgba(123,44,191,0.15));
            border-radius: 32px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(255,107,53,0.3);
        }
        .slogan {
            font-size: 20px;
            font-weight: 700;
            color: #FF6B35;
            text-align: center;
        }
        .slogan-sub {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-align: center;
            margin-top: 8px;
        }
        .desc-box {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 20px;
            margin: 16px 0;
            font-size: 14px;
            line-height: 1.6;
            color: rgba(255,255,255,0.8);
        }
        .character-image {
            text-align: center;
            margin: 16px 0;
        }
        .character-image img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,107,53,0.2), rgba(123,44,191,0.2));
            padding: 10px;
            border: 2px solid rgba(255,107,53,0.3);
        }
        .radar-container {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 20px;
            margin: 16px 0;
        }
        .radar-title {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            margin-bottom: 16px;
            text-align: center;
        }
        .dimension-item {
            margin: 16px 0;
        }
        .dimension-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.8);
        }
        .dimension-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            height: 10px;
            overflow: hidden;
        }
        .dimension-fill {
            background: linear-gradient(90deg, #FF6B35, #FF2A6D);
            width: 0%;
            height: 100%;
            border-radius: 20px;
        }
        .wechat-box {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 32px;
            margin: 20px 0;
        }
        .wechat-id-box {
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 12px 20px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0;
            border: 1px solid rgba(255,107,53,0.3);
        }
        .wechat-id {
            color: #FF6B35;
            font-weight: 600;
        }
        .copy-btn {
            background: linear-gradient(135deg, #FF6B35, #FF2A6D);
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            padding: 14px 20px;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .btn:hover {
            background: rgba(255,107,53,0.3);
            transform: translateY(-2px);
        }
        .disclaimer {
            margin-top: 20px;
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            text-align: center;
        }
        @media (max-width: 480px) {
            .personality-name {
                font-size: 36px;
            }
            .slogan {
                font-size: 16px;
            }
            .action-buttons {
                flex-direction: column;
            }
            .character-image img {
                width: 120px;
                height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="report-card" id="reportCard">
            <div class="result-header">
                <div class="logo">🧠✨</div>
                <div class="title">精神状态诊断报告</div>
                <div class="subtitle">YOUR MENTAL STATE DIAGNOSIS</div>
            </div>
            
            <div class="personality-badge">
                <div class="personality-name" id="personalityName">—</div>
                <div><span class="personality-tag" id="personalityTag">—</span></div>
            </div>
            
            <div class="slogan-box">
                <div class="slogan" id="slogan">—</div>
                <div class="slogan-sub">✨ 你的精神状态一句话总结 ✨</div>
            </div>
            
            <!-- 卡通形象图片 -->
            <div class="character-image" id="characterImage">
                <img id="personalityImg" src="" alt="人格形象">
            </div>
            
            <div class="desc-box" id="descBox">
                — 加载中 —
            </div>
            
            <div class="radar-container">
                <div class="radar-title">📊 五维精神状态雷达</div>
                <div class="dimension-item">
                    <div class="dimension-label"><span>🧠 清醒度</span><span id="awakeScore">0/5</span></div>
                    <div class="dimension-bar"><div class="dimension-fill" id="awakeFill" style="width:0%"></div></div>
                </div>
                <div class="dimension-item">
                    <div class="dimension-label"><span>😴 摆烂度</span><span id="slackScore">0/5</span></div>
                    <div class="dimension-bar"><div class="dimension-fill" id="slackFill" style="width:0%"></div></div>
                </div>
                <div class="dimension-item">
                    <div class="dimension-label"><span>👥 社交欲</span><span id="socialScore">0/5</span></div>
                    <div class="dimension-bar"><div class="dimension-fill" id="socialFill" style="width:0%"></div></div>
                </div>
                <div class="dimension-item">
                    <div class="dimension-label"><span>🎭 情绪化</span><span id="emotionalScore">0/5</span></div>
                    <div class="dimension-bar"><div class="dimension-fill" id="emotionalFill" style="width:0%"></div></div>
                </div>
                <div class="dimension-item">
                    <div class="dimension-label"><span>🎮 掌控欲</span><span id="controlScore">0/5</span></div>
                    <div class="dimension-bar"><div class="dimension-fill" id="controlFill" style="width:0%"></div></div>
                </div>
            </div>
            
            <div class="wechat-box">
                <div style="font-size: 32px;">💬</div>
                <h3 style="margin: 8px 0; color: #FF6B35;">加入「精神状态交流群」</h3>
                <p style="font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 16px;">
                    和同款精神状态的小伙伴一起玩耍
                </p>
                <div class="wechat-id-box">
                    <span>📱 微信号：</span>
                    <strong class="wechat-id" id="wechatId">psyche_helper</strong>
                    <button id="copyBtn" class="copy-btn">复制</button>
                </div>
                <p style="font-size: 11px; color: rgba(255,255,255,0.4);">
                    添加时备注"精神状态"，拉你入群
                </p>
            </div>
            
            <div class="action-buttons">
                <button id="saveImgBtn" class="btn">📸 保存报告图</button>
                <button id="shareBtn" class="btn">📤 分享结果</button>
                <a href="index.html" class="btn">🔄 重新测试</a>
            </div>
            
            <div class="disclaimer">
                🎭 仅供娱乐，请勿较真。你的精神状态由你定义~
            </div>
        </div>
    </div>

    <script>
        // 人格对应的图片文件名
        var personalityImages = {
            "人间观察员": "observer.png",
            "人间清醒": "sober.png",
            "漂浮者": "float.png",
            "躺平大师": "lay.png",
            "树懒本懒": "sloth.png",
            "佛系玩家": "zen.png",
            "精神内耗师": "overthink.png",
            "拖延症晚期": "procra.png",
            "社恐重症": "social.png",
            "卷心菜": "roll.png",
            "搞钱人": "hustle.png",
            "计划狂魔": "planner.png",
            "情感绝缘体": "stone.png",
            "恋爱脑晚期": "depend.png",
            "边界大师": "boundary.png"
        };
        
        function calculateScoresFromAnswers(answers) {
            var scores = { awake: 0, slack: 0, social: 0, emotional: 0, control: 0 };
            var counts = { awake: 0, slack: 0, social: 0, emotional: 0, control: 0 };
            
            for (var i = 0; i < answers.length; i++) {
                var answer = answers[i];
                if (answer === null) continue;
                var mapping = dimensionMapping[i];
                var score = answer;
                if (mapping.reverse) score = 6 - answer;
                scores[mapping.dim] += score;
                counts[mapping.dim]++;
            }
            
            for (var dim in scores) {
                if (counts[dim] > 0) {
                    scores[dim] = Math.round((scores[dim] / (counts[dim] * 5)) * 5);
                } else {
                    scores[dim] = 3;
                }
            }
            return scores;
        }
        
        function renderResult() {
            var answers = JSON.parse(localStorage.getItem('mental_answers'));
            var actualAge = JSON.parse(localStorage.getItem('mental_age'));
            
            if (!answers || !actualAge) {
                window.location.href = 'index.html';
                return;
            }
            
            var dimScores = calculateScoresFromAnswers(answers);
            var personality = getPersonality(dimScores);
            
            document.getElementById('personalityName').innerHTML = personality.name;
            document.getElementById('personalityTag').innerHTML = personality.tag;
            document.getElementById('slogan').innerHTML = personality.slogan;
            document.getElementById('descBox').innerHTML = personality.desc;
            
            // 设置卡通形象图片
            var imgFile = personalityImages[personality.name];
            if (imgFile) {
                document.getElementById('personalityImg').src = 'images/' + imgFile;
            } else {
                // 如果没有匹配的图片，显示默认emoji
                document.getElementById('personalityImg').style.display = 'none';
                document.getElementById('characterImage').innerHTML = '<div style="font-size: 80px;">🎭</div>';
            }
            
            document.getElementById('awakeScore').innerHTML = dimScores.awake + '/5';
            document.getElementById('slackScore').innerHTML = dimScores.slack + '/5';
            document.getElementById('socialScore').innerHTML = dimScores.social + '/5';
            document.getElementById('emotionalScore').innerHTML = dimScores.emotional + '/5';
            document.getElementById('controlScore').innerHTML = dimScores.control + '/5';
            
            document.getElementById('awakeFill').style.width = (dimScores.awake / 5 * 100) + '%';
            document.getElementById('slackFill').style.width = (dimScores.slack / 5 * 100) + '%';
            document.getElementById('socialFill').style.width = (dimScores.social / 5 * 100) + '%';
            document.getElementById('emotionalFill').style.width = (dimScores.emotional / 5 * 100) + '%';
            document.getElementById('controlFill').style.width = (dimScores.control / 5 * 100) + '%';
            
            document.getElementById('shareBtn').onclick = function() {
                var shareText = '我的精神状态诊断结果：' + personality.name + '（' + personality.slogan + '）快来测测你的精神状态！';
                if (navigator.share) {
                    navigator.share({ title: '精神状态评估', text: shareText, url: window.location.href });
                } else {
                    prompt('分享链接', window.location.href);
                }
            };
            
            document.getElementById('copyBtn').onclick = function() {
                var wechatId = document.getElementById('wechatId').innerText;
                navigator.clipboard.writeText(wechatId).then(function() {
                    alert('微信号已复制，添加时备注"精神状态"~');
                });
            };
            
            var saveBtn = document.getElementById('saveImgBtn');
            if (saveBtn) {
                saveBtn.onclick = function() {
                    var element = document.getElementById('reportCard');
                    var btn = this;
                    var originalText = btn.innerText;
                    btn.innerText = '生成中...';
                    btn.disabled = true;
                    
                    html2canvas(element, {
                        scale: 2,
                        backgroundColor: '#0A0A0A',
                        logging: false,
                        useCORS: true
                    }).then(function(canvas) {
                        var link = document.createElement('a');
                        link.download = '精神状态诊断报告.png';
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                        btn.innerText = originalText;
                        btn.disabled = false;
                    }).catch(function(error) {
                        console.error('截图失败:', error);
                        btn.innerText = originalText;
                        btn.disabled = false;
                        alert('保存失败，请重试');
                    });
                };
            }
        }
        
        renderResult();
    </script>
</body>
</html>
