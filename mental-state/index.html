<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>精神状态评估 - 你的精神状态还好吗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #FF6B35 0%, #7B2CBF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            width: 90%;
            margin: 20px;
        }
        .card {
            background: #FFF7ED;
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            padding: 40px 28px;
            text-align: center;
        }
        .logo {
            font-size: 56px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #FF6B35, #7B2CBF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: #7e8c9e;
            margin-bottom: 32px;
        }
        .theory-badge {
            background: linear-gradient(135deg, #FFF0E6, #F3E8FF);
            padding: 12px;
            border-radius: 24px;
            margin: 16px 0;
            font-size: 12px;
            color: #FF6B35;
            text-align: left;
            font-weight: 500;
        }
        .password-input {
            width: 100%;
            max-width: 260px;
            padding: 14px 20px;
            font-size: 20px;
            font-weight: 500;
            border: 2px solid #FFD1B3;
            border-radius: 60px;
            text-align: center;
            letter-spacing: 4px;
            font-family: monospace;
            margin: 16px auto;
            display: block;
            background: white;
        }
        .password-input:focus {
            outline: none;
            border-color: #FF6B35;
        }
        .btn {
            display: inline-block;
            padding: 14px 36px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: linear-gradient(135deg, #FF6B35, #7B2CBF);
            color: white;
            margin-top: 8px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 107, 53, 0.4);
        }
        .error-msg {
            color: #FF6B35;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            background: #FFF0E6;
            padding: 10px;
            border-radius: 24px;
        }
        .hint {
            font-size: 12px;
            color: #9aaebf;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #FFD1B3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">🧠✨</div>
            <h1>精神状态评估</h1>
            <p class="subtitle">你的精神状态还好吗？</p>
            
            <div class="theory-badge">
                🎭 15种精神状态诊断 · 25题 · 3分钟
            </div>
            
            <input type="password" id="passwordInput" class="password-input" placeholder="提取码" maxlength="10" autocomplete="off">
            
            <button id="unlockBtn" class="btn">开始诊断 🔍</button>
            
            <div id="errorMsg" class="error-msg">❌ 提取码错误</div>
            
            <div class="hint">
                💡 购买后请联系客服获取提取码<br>
                📱 微信：<strong id="wechatDisplay">chenmj1221</strong>
            </div>
        </div>
    </div>

    <script>
        const UNLOCK_CODE = "6688";
        const VALID_CODES = ["6688", "8888"];
        
        document.getElementById('unlockBtn').onclick = function() {
            const inputCode = document.getElementById('passwordInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            
            if (VALID_CODES.includes(inputCode) || inputCode === UNLOCK_CODE) {
                localStorage.setItem('mental_unlocked', 'true');
                window.location.href = 'age-input.html';
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('passwordInput').value = '';
                setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
            }
        };
        
        document.getElementById('passwordInput').onkeypress = function(e) {
            if (e.key === 'Enter') document.getElementById('unlockBtn').click();
        };
        
        if (localStorage.getItem('mental_unlocked') === 'true') {
            window.location.href = 'age-input.html';
        }
        
        document.getElementById('wechatDisplay').innerText = 'psyche_helper';
    </script>
</body>
</html>
