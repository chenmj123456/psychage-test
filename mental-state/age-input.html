<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>精神状态评估 - 基本信息</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #FF6B35 0%, #7B2CBF 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .card {
            background: #FFF7ED;
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px 28px;
            margin: 16px 0;
            text-align: center;
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        h2 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #FF6B35, #7B2CBF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subtitle {
            font-size: 14px;
            color: #7e8c9e;
            margin-top: 8px;
        }
        .age-picker {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 24px 0;
            flex-wrap: wrap;
        }
        .age-picker select {
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #FFD1B3;
            border-radius: 32px;
            background: white;
            font-family: inherit;
            cursor: pointer;
            flex: 1;
            min-width: 100px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #FF6B35, #7B2CBF);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
            display: inline-block;
            width: 100%;
            padding: 16px 24px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h2>先来点基本信息</h2>
                <p class="subtitle">为了更精准的诊断~</p>
            </div>
            
            <div class="age-picker">
                <select id="yearSelect"></select>
                <select id="monthSelect"></select>
                <select id="daySelect"></select>
            </div>
            
            <div style="margin: 16px 0;">
                <label style="display: flex; align-items: center; justify-content: center; gap: 16px;">
                    <input type="radio" name="gender" value="female" checked> 小姐姐
                    <input type="radio" name="gender" value="male"> 小哥哥
                    <input type="radio" name="gender" value="other"> 神秘人
                </label>
            </div>
            
            <button id="startTestBtn" class="btn-primary">开始诊断 ✨</button>
            
            <p class="subtitle" style="margin-top: 24px;">
                信息仅用于本次评估，不会被存储
            </p>
        </div>
    </div>
    
    <script>
        const yearSelect = document.getElementById('yearSelect');
        const monthSelect = document.getElementById('monthSelect');
        const daySelect = document.getElementById('daySelect');
        
        const currentYear = new Date().getFullYear();
        for (let year = currentYear; year >= 1920; year--) {
            const option = document.createElement('option');
            option.value = year;
            option.textContent = year;
            if (year === 1995) option.selected = true;
            yearSelect.appendChild(option);
        }
        
        const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        months.forEach((month, i) => {
            const option = document.createElement('option');
            option.value = i + 1;
            option.textContent = month;
            monthSelect.appendChild(option);
        });
        
        function updateDays() {
            const year = parseInt(yearSelect.value);
            const month = parseInt(monthSelect.value);
            const daysInMonth = new Date(year, month, 0).getDate();
            daySelect.innerHTML = '';
            for (let day = 1; day <= daysInMonth; day++) {
                const option = document.createElement('option');
                option.value = day;
                option.textContent = day + '日';
                if (day === 1) option.selected = true;
                daySelect.appendChild(option);
            }
        }
        
        yearSelect.addEventListener('change', updateDays);
        monthSelect.addEventListener('change', updateDays);
        updateDays();
        
        function calculateAge(birthYear, birthMonth, birthDay) {
            const today = new Date();
            let age = today.getFullYear() - birthYear;
            const monthDiff = today.getMonth() + 1 - birthMonth;
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDay)) age--;
            return age;
        }
        
        document.getElementById('startTestBtn').onclick = () => {
            const year = parseInt(yearSelect.value);
            const month = parseInt(monthSelect.value);
            const day = parseInt(daySelect.value);
            const gender = document.querySelector('input[name="gender"]:checked').value;
            
            const age = calculateAge(year, month, day);
            if (age < 16) { alert('建议16岁及以上用户参与~'); return; }
            if (age > 100) { alert('请输入有效年龄~'); return; }
            
            localStorage.setItem('mental_age', JSON.stringify(age));
            localStorage.setItem('mental_gender', gender);
            localStorage.removeItem('mental_answers');
            window.location.href = 'test.html';
        };
    </script>
</body>
</html>
